name: Set Backblaze B2 Native CORS

on:
  workflow_dispatch:

jobs:
  set-cors:
    runs-on: ubuntu-latest

    steps:
      - name: Install Backblaze B2 CLI
        run: pip install b2

      - name: Authorize B2 account
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          b2 account authorize "$B2_KEY_ID" "$B2_APPLICATION_KEY"

      - name: Apply CORS rules to bucket
        run: >
          b2 bucket update
          --cors-rules '[{"corsRuleName":"promar-transfer","allowedOrigins":["https://www.promar.hr","https://promar.hr"],"allowedHeaders":["*"],"allowedOperations":["s3_put","s3_get","s3_head","s3_delete"],"exposeHeaders":["ETag"],"maxAgeSeconds":3600}]'
          promar-svadbe-transfer
          allPrivate

      - name: Show bucket config
        run: b2 bucket get promar-svadbe-transfer --showSize
